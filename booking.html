<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Installation - Car Accessories Management System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Layout overrides */
        body {
            display: block;
            height: auto;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: var(--card-bg);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }
        .logo { font-weight: 600; font-size: 1.2rem; color: var(--text-main); }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        .nav-links a:hover { color: var(--text-main); }
        
        /* Avatar Icon */
        .avatar-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            color: white;
            font-weight: 600;
            text-decoration: none;
        }
        .avatar-icon:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            transform: scale(1.1);
        }

        /* Booking Layout */
        .booking-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .booking-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .booking-header { margin-bottom: 24px; text-align: center; }
        .booking-header h1 { margin: 0 0 8px; color: var(--text-main); font-size: 1.8rem; }
        .booking-header p { margin: 0; color: var(--text-muted); }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
        
        /* Override global input-field padding since we aren't using icons here */
        .input-field { padding: 12px 16px; }

        /* Time Slot Grid */
        .time-slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }
        
        .time-slot {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            color: var(--text-muted);
            text-align: center;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .time-slot:hover { border-color: var(--accent-color); color: var(--text-main); }
        
        .time-slot.selected {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .time-slot.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: rgba(0,0,0,0.05);
        }

    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">CAMS</div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="cart.html">Cart</a>
            <a href="garage.html">Garage</a>
            <a href="settings.html" class="avatar-icon" title="Settings">👤</a>
            <a href="index.html">Logout</a>
        </div>
    </nav>

    <div class="booking-container">
        <div class="booking-card">
            <div class="booking-header">
                <h1>Book Installation</h1>
                <p>Secure a slot for your vehicle service</p>
            </div>

            <form id="bookingForm">
                <div class="form-group">
                    <label class="form-label">Service / Product</label>
                    <input type="text" id="serviceName" class="input-field" value="General Installation" readonly style="background-color: var(--input-bg); opacity: 0.8;">
                </div>

                <div class="form-group">
                    <label class="form-label">Select Vehicle</label>
                    <select id="vehicleSelect" class="input-field" required>
                        <option value="">-- Select from Garage --</option>
                    </select>
                    <div style="margin-top: 8px; font-size: 0.85rem;">
                        <a href="garage.html" style="color: var(--accent-color); text-decoration: none;">+ Add new vehicle</a>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Select Date</label>
                    <input type="date" id="bookingDate" class="input-field" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Available Time Slots</label>
                    <div class="time-slots-grid" id="timeSlotsContainer">
                        <!-- Slots injected via JS -->
                        <div class="time-slot disabled">Select Date First</div>
                    </div>
                    <input type="hidden" id="selectedTime" name="selectedTime" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Additional Notes</label>
                    <textarea class="input-field" rows="3" placeholder="Any specific requirements?"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Confirm Booking</button>
            </form>
        </div>
    </div>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
    </button>

    <script>
        // 1. Populate Service Name from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productName = urlParams.get('product');
        if (productName) {
            document.getElementById('serviceName').value = "Installation: " + decodeURIComponent(productName);
        }

        // 2. Populate Vehicles from LocalStorage
        const vehicles = JSON.parse(localStorage.getItem('userGarageVehicles')) || [];
        const vehicleSelect = document.getElementById('vehicleSelect');
        
        if (vehicles.length > 0) {
            vehicles.forEach((v, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${v.year} ${v.make} ${v.model}`;
                vehicleSelect.appendChild(option);
            });
        }

        // 3. Date & Time Logic
        const dateInput = document.getElementById('bookingDate');
        const slotsContainer = document.getElementById('timeSlotsContainer');
        const timeInput = document.getElementById('selectedTime');

        // Set min date to today
        const today = new Date().toISOString().split('T')[0];
        dateInput.setAttribute('min', today);

        const timeSlots = [
            "09:00 AM", "10:00 AM", "11:00 AM", 
            "01:00 PM", "02:00 PM", "03:00 PM", "04:00 PM"
        ];

        dateInput.addEventListener('change', function() {
            if (this.value) {
                renderTimeSlots();
            }
        });

        function renderTimeSlots() {
            slotsContainer.innerHTML = '';
            timeSlots.forEach(time => {
                const slot = document.createElement('div');
                slot.className = 'time-slot';
                slot.textContent = time;
                slot.onclick = () => selectSlot(slot, time);
                slotsContainer.appendChild(slot);
            });
        }

        function selectSlot(element, time) {
            // Remove active class from all
            document.querySelectorAll('.time-slot').forEach(el => el.classList.remove('selected'));
            // Add to clicked
            element.classList.add('selected');
            // Update hidden input
            timeInput.value = time;
        }

        // 4. Form Submission
        document.getElementById('bookingForm').addEventListener('submit', (e) => {
            e.preventDefault();
            if (!timeInput.value) {
                alert('Please select a time slot.');
                return;
            }
            
            const service = document.getElementById('serviceName').value;
            const date = dateInput.value;
            const time = timeInput.value;
            const notes = document.querySelector('textarea').value;
            const vehicleIndex = vehicleSelect.value;
            const vehicleText = vehicleIndex !== "" ? vehicleSelect.options[vehicleSelect.selectedIndex].textContent : "General Vehicle";

            // Create booking object to send to Admin Dashboard
            const newBooking = {
                id: Math.floor(Math.random() * 10000), // Random ID
                customer_name: "Uthman", // In a real app, this would be the session username
                order_date: new Date().toISOString().split('T')[0],
                booking_date: date,
                booking_time: time,
                amount: 150.00, // Fixed installation fee
                status: 'pending',
                service: service,
                vehicle: vehicleText,
                notes: notes
            };

            // Persist for Admin Monitoring
            const allBookings = JSON.parse(localStorage.getItem('allBookings')) || [];
            allBookings.unshift(newBooking); // Add to start of list
            localStorage.setItem('allBookings', JSON.stringify(allBookings));
            
            alert('Booking Confirmed!\nService: ' + service + 
                  '\nDate: ' + date + 
                  '\nTime: ' + time);
            
            // Redirect to payment page with booking details
            window.location.href = `payment.html?service=${encodeURIComponent(service)}&date=${encodeURIComponent(date)}&time=${encodeURIComponent(time)}`;
        });

        // Theme Toggle Logic
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
