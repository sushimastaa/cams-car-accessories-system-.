<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Car Accessories Management System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Layout overrides for scrolling */
        body {
            display: block;
            height: auto;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        /* Navbar (Consistent with other pages) */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: var(--card-bg);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }
        .logo { font-weight: 600; font-size: 1.2rem; color: var(--text-main); }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        .nav-links a:hover { color: var(--text-main); }
        
        /* Avatar Icon */
        .avatar-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            color: white;
            font-weight: 600;
            text-decoration: none;
        }
        .avatar-icon:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            transform: scale(1.1);
        }

        /* Product Details Layout */
        .product-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        /* Image Section */
        .product-gallery {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .main-image-container {
            width: 100%;
            aspect-ratio: 4/3;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            overflow: hidden;
        }
        .main-image-container svg { width: 120px; height: 120px; }

        /* Info Section */
        .product-info {
            display: flex;
            flex-direction: column;
        }
        .breadcrumb { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 16px; }
        .breadcrumb a { color: var(--text-muted); text-decoration: none; }
        .breadcrumb a:hover { color: var(--accent-color); }

        .product-title { font-size: 2rem; color: var(--text-main); margin: 0 0 12px; line-height: 1.2; }
        .product-rating { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; color: #fbbf24; font-size: 1rem; }
        .product-price { font-size: 1.75rem; font-weight: 600; color: var(--text-main); margin-bottom: 24px; }
        
        .product-description { color: var(--text-muted); line-height: 1.6; margin-bottom: 32px; font-size: 1rem; }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }
        .btn-lg {
            padding: 14px 28px;
            font-size: 1rem;
            flex: 1;
            max-width: 200px;
        }
        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            cursor: pointer;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-outline:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background-color: var(--input-bg);
        }

        /* Features/Specs */
        .specs-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
        }
        .specs-box h3 { margin-top: 0; color: var(--text-main); margin-bottom: 16px; }
        .spec-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }
        .spec-row:last-child { border-bottom: none; }
        .spec-label { color: var(--text-muted); }
        .spec-value { color: var(--text-main); font-weight: 500; }

        @media (max-width: 768px) {
            .product-container { grid-template-columns: 1fr; }
            .action-buttons { flex-direction: column; }
            .btn-lg { max-width: 100%; }
        }
    </style>
    <style>
        /* Customer Feedback Section */
        .product-feedback {
            grid-column: 1 / -1; /* Span across both columns */
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-top: 20px;
        }
        .product-feedback h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--text-main);
            font-size: 1.5rem;
        }
        .star-rating {
            display: flex;
            gap: 5px;
            font-size: 2rem;
            color: var(--text-muted); /* Default star color */
            margin-bottom: 20px;
        }
        .star-rating .star {
            cursor: pointer;
            transition: color 0.2s;
        }
        .star-rating .star.selected,
        .star-rating .star:hover,
        .star-rating .star.hover-effect { /* For hover effect before selection */
            color: #fbbf24; /* Accent color for selected/hovered stars */
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">CAMS</div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="cart.html">Cart</a>
            <a href="garage.html">Garage</a>
            <a href="settings.html" class="avatar-icon" title="Settings">👤</a>
            <a href="index.html" onclick="handleLogout(); return false;">Logout</a>
        </div>
    </nav>

    <div class="product-container">
        <!-- Left Column: Images -->
        <div class="product-gallery">
            <div class="main-image-container">
                <img id="productImage" src="" alt="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                <svg id="imagePlaceholder" width="64" height="64" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
            </div>
        </div>

        <!-- Right Column: Info -->
        <div class="product-info">
            <div class="breadcrumb">
                <a href="shop.html">Shop</a> / <span id="categoryBreadcrumb">Category</span> / <span id="productBreadcrumb">Product Name</span>
            </div>
            
            <h1 class="product-title" id="productName">Loading...</h1>
            
            <div class="product-rating">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                <span id="productRating">0.0</span> <span style="color: var(--text-muted); font-size: 0.9rem;">(128 reviews)</span>
            </div>

            <div class="product-price" id="productPrice">RM0.00</div>

            <p class="product-description" id="productDesc">
                Loading description...
            </p>

            <div class="quantity-selector" style="margin-bottom: 20px;">
                <label for="productQuantity" style="display: block; margin-bottom: 8px; color: var(--text-muted);">Quantity:</label>
                <input type="number" id="productQuantity" value="1" min="1" max="99" style="width: 80px; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); background-color: var(--input-bg); color: var(--text-main);">
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary btn-lg" id="btnOrder">Add to Cart</button>
                <button class="btn btn-outline btn-lg" id="btnBookInstall">Book for Installation</button>
            </div>

            <div class="specs-box">
                <h3>Product Specifications</h3>
                <div class="spec-row"><span class="spec-label">Compatibility</span><span class="spec-value" id="productCompatibility">Universal</span></div>
                <div class="spec-row"><span class="spec-label">Specifications</span><span class="spec-value" id="productSpecs" style="text-align: right; max-width: 60%;">N/A</span></div>
                <div class="spec-row"><span class="spec-label">In Stock</span><span class="spec-value">Available</span></div>
            </div>
        </div>
    </div>

    <!-- Customer Feedback Section -->
    <div class="product-feedback product-container">
        <h2>Customer Feedback</h2>
        <div class="star-rating" id="starRating">
            <span class="star" data-value="1">&#9733;</span>
            <span class="star" data-value="2">&#9733;</span>
            <span class="star" data-value="3">&#9733;</span>
            <span class="star" data-value="4">&#9733;</span>
            <span class="star" data-value="5">&#9733;</span>
        </div>
        <textarea id="feedbackComment" placeholder="Share your thoughts on this product..." rows="4" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background-color: var(--input-bg); color: var(--text-main); font-family: inherit; font-size: 1rem; resize: vertical; margin-bottom: 20px; box-sizing: border-box;"></textarea>
        <button class="btn btn-primary" id="submitFeedback">Submit Feedback</button>
    </div>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
    </button>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. URL Parameter Parsing
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                renderNotFound();
                return;
            }

            // 2. Supabase Data Fetching
            const { data: product, error } = await window.supabase
                .from('products')
                .select('*')
                .eq('id', productId)
                .single();

            // Handle error state (Product not found or DB error)
            if (error || !product) {
                console.error("Error fetching product:", error);
                renderNotFound();
                return;
            }

            // 3. DOM Injection (Standard Fields)
            document.getElementById('productName').textContent = product.name || 'Unknown Product';
            document.getElementById('productBreadcrumb').textContent = product.name || 'Product';
            document.getElementById('categoryBreadcrumb').textContent = product.category || 'Category';
            document.getElementById('productPrice').textContent = 'RM' + parseFloat(product.price || 0).toFixed(2);
            document.getElementById('productRating').textContent = product.rating || '0.0';
            
            // Inject description
            document.getElementById('productDesc').textContent = product.description || 'No description available.';
            
            // Display product image
            if (product.image) {
                const img = document.getElementById('productImage');
                if (img) {
                    img.src = product.image;
                    img.alt = product.name;
                    img.style.display = 'block';
                }
                const placeholder = document.getElementById('imagePlaceholder');
                if (placeholder) placeholder.style.display = 'none';
            }

            // 3. DOM Injection (NEW Fields: Specs & Compatibility)
            const specsElement = document.getElementById('productSpecs');
            if (specsElement) {
                specsElement.textContent = product.specifications || 'N/A';
            }

            const compatibilityElement = document.getElementById('productCompatibility');
            if (compatibilityElement) {
                compatibilityElement.textContent = product.compatibility || 'Universal';
            }

            // 4. Add to Cart Integration
            const btnOrder = document.getElementById('btnOrder');
            if (btnOrder) {
                btnOrder.onclick = async function() {
                    // Get the current user session securely
                    const session = await getSession();
                    
                    if (!session) {
                        alert('Please log in to add items to your cart.');
                        window.location.href = 'index.html';
                        return;
                    }

                    const userId = session.user.id;
                    const quantityInput = document.getElementById('productQuantity');
                    const quantity = quantityInput ? parseInt(quantityInput.value, 10) : 1;

                    // Check if this user already has this exact product in their cart
                    const { data: existingCart, error: fetchError } = await window.supabase
                        .from('cart')
                        .select('id, quantity')
                        .eq('user_id', userId)
                        .eq('product_id', product.id)
                        .maybeSingle();

                    if (existingCart) {
                        // Update existing cart row by adding to the quantity
                        const { error: updateError } = await window.supabase
                            .from('cart')
                            .update({ quantity: existingCart.quantity + quantity })
                            .eq('id', existingCart.id);
                        
                        if (!updateError) alert(`${quantity}x ${product.name} added to cart!`);
                        else alert('Error updating cart: ' + updateError.message);
                    } else {
                        // Insert new row into the cart table
                        const { error: insertError } = await window.supabase
                            .from('cart')
                            .insert([{ user_id: userId, product_id: product.id, quantity: quantity }]);
                        
                        if (!insertError) alert(`${quantity}x ${product.name} added to cart!`);
                        else alert('Error adding to cart: ' + insertError.message);
                    }
                };
            }

            // Booking Button Logic (Keep the existing query param logic)
            const btnBook = document.getElementById('btnBookInstall');
            if (btnBook) {
                btnBook.onclick = function() {
                    window.location.href = 'booking.html?product=' + encodeURIComponent(product.name);
                };
            }
        });

        // Helper function to show UI state when item is missing or URL param is empty
        function renderNotFound() {
            const infoContainer = document.querySelector('.product-info');
            if (infoContainer) {
                infoContainer.innerHTML = '<h2>Product not found</h2><br><a href="shop.html" style="color: var(--accent-color); text-decoration: underline;">Return to Shop</a>';
            }
        }

        // Theme Toggle Logic
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
