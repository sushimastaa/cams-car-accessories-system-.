<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Car Accessories Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Tech Drawing SVG -->
    <svg class="tech-drawing" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
            </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />
        <circle cx="200" cy="200" r="150" fill="none" stroke="#ffffff" stroke-width="1" />
        <circle cx="200" cy="200" r="60" fill="none" stroke="#ffffff" stroke-width="1" />
        <line x1="20" y1="200" x2="380" y2="200" stroke="#ffffff" stroke-width="0.5" />
        <line x1="200" y1="20" x2="200" y2="380" stroke="#ffffff" stroke-width="0.5" />
    </svg>

    <div class="login-card">
        <div class="header">
            <h1>Admin Login</h1>
            <p>Authorized personnel only</p>
        </div>

        <form id="adminLoginForm">
            <div class="input-group">
                <div class="input-wrapper">
                    <!-- User Icon -->
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <input type="text" id="adminUsername" class="input-field" placeholder="Admin Username" required>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <!-- Lock Icon -->
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    <input type="password" id="adminPassword" class="input-field" placeholder="Admin Password" required>
                    <!-- Toggle Password Icon -->
                    <svg class="toggle-password" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                </div>
            </div>
            <p id="loginErrorMessage" class="error-message"></p>

            <button type="submit" class="btn btn-primary">Sign In to Dashboard</button>
        </form>

        <div class="footer">
            New admin? <a href="admin_register.html">Register here</a>
        </div>
    </div>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
    </button>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value; // In a real app, this would be hashed
            const errorMessageElement = document.getElementById('loginErrorMessage');

            // Clear any previous error messages
            errorMessageElement.textContent = '';
            errorMessageElement.style.display = 'none';

            // Retrieve admin accounts from localStorage
            const adminAccounts = JSON.parse(localStorage.getItem('adminAccounts')) || [];

            // Find a matching admin account
            const foundAdmin = adminAccounts.find(account => 
                (account.username === username || account.email === username) && account.password === password
            );

            if (foundAdmin) {
                // In a real application, a session token would be set here.
                // For this client-side example, we'll just redirect.
                console.log('Admin login successful for:', username);
                window.location.href = 'admin_dashboard.html';
            } else {
                errorMessageElement.textContent = 'Invalid administrator credentials. Please try again.';
                errorMessageElement.style.display = 'block'; // Show the error message
            }
        });

        // Clear error message when inputs change
        document.getElementById('adminUsername').addEventListener('input', function() {
            document.getElementById('loginErrorMessage').textContent = '';
            document.getElementById('loginErrorMessage').style.display = 'none';
        });
        document.getElementById('adminPassword').addEventListener('input', function() {
            document.getElementById('loginErrorMessage').textContent = '';
            document.getElementById('loginErrorMessage').style.display = 'none';
        });

        // Password Toggle
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const input = this.previousElementSibling;
                input.type = input.type === 'password' ? 'text' : 'password';
            });
        });

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }
    </script>
</body>
</html>
