<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Tech Drawing SVG (Abstract Brake Disc/Part) -->
    <svg class="tech-drawing" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
            </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />
        
        <!-- Main Part Outline -->
        <circle cx="200" cy="200" r="150" fill="none" stroke="#ffffff" stroke-width="1" />
        <circle cx="200" cy="200" r="140" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="5,5" />
        <circle cx="200" cy="200" r="60" fill="none" stroke="#ffffff" stroke-width="1" />
        
        <!-- Crosshairs -->
        <line x1="20" y1="200" x2="380" y2="200" stroke="#ffffff" stroke-width="0.5" />
        <line x1="200" y1="20" x2="200" y2="380" stroke="#ffffff" stroke-width="0.5" />
        
        <!-- Detail Elements -->
        <circle cx="200" cy="100" r="10" fill="none" stroke="#ffffff" stroke-width="1" />
        <circle cx="200" cy="300" r="10" fill="none" stroke="#ffffff" stroke-width="1" />
        <circle cx="100" cy="200" r="10" fill="none" stroke="#ffffff" stroke-width="1" />
        <circle cx="300" cy="200" r="10" fill="none" stroke="#ffffff" stroke-width="1" />
        
        <!-- Measurement Lines -->
        <path d="M 360 200 L 370 200 L 370 100 L 360 100" fill="none" stroke="#ffffff" stroke-width="0.5" />
        <text x="375" y="150" fill="#ffffff" font-family="monospace" font-size="10" opacity="0.8">Ø300mm</text>
    </svg>

    <div class="login-card">
        <div class="header">
            <h1>Reset Password</h1>
            <p>Enter your email to receive reset instructions</p>
        </div>

        <form id="forgotPasswordForm">
            <div class="input-group">
                <div class="input-wrapper">
                    <!-- Email Icon -->
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    <input type="email" class="input-field" placeholder="Email Address" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Send Reset Link</button>
        </form>

        <div class="footer">
            <a href="index.html">Back to Sign In</a>
        </div>
    </div>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
    </button>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', function(event) {
            event.preventDefault();
            // Mock Reset Logic
            alert('If an account exists for this email, you will receive reset instructions shortly.');
            window.location.href = 'index.html';
        });

        // Theme Toggle Logic
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
