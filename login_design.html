<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automotive App Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Tech Drawing SVG (Abstract Brake Disc/Part) -->
    <svg class="tech-drawing" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
            </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />
        
        <!-- Main Part Outline -->
        <circle cx="200" cy="200" r="150" fill="none" stroke="#ffffff" stroke-width="1" />
        <circle cx="200" cy="200" r="140" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="5,5" />
        <circle cx="200" cy="200" r="60" fill="none" stroke="#ffffff" stroke-width="1" />
        
        <!-- Crosshairs -->
        <line x1="20" y1="200" x2="380" y2="200" stroke="#ffffff" stroke-width="0.5" />
        <line x1="200" y1="20" x2="200" y2="380" stroke="#ffffff" stroke-width="0.5" />
        
        <!-- Detail Elements -->
        <circle cx="200" cy="100" r="10" fill="none" stroke="#ffffff" stroke-width="1" />
        <circle cx="200" cy="300" r="10" fill="none" stroke="#ffffff" stroke-width="1" />
        <circle cx="100" cy="200" r="10" fill="none" stroke="#ffffff" stroke-width="1" />
        <circle cx="300" cy="200" r="10" fill="none" stroke="#ffffff" stroke-width="1" />
        
        <!-- Measurement Lines -->
        <path d="M 360 200 L 370 200 L 370 100 L 360 100" fill="none" stroke="#ffffff" stroke-width="0.5" />
        <text x="375" y="150" fill="#ffffff" font-family="monospace" font-size="10" opacity="0.8">Ø300mm</text>
    </svg>

    <div class="login-card">
        <div class="header">
            <h1>Welcome Back</h1>
            <p>Sign in to access your vehicle data</p>
        </div>

        <form>
            <div class="input-group">
                <div class="input-wrapper">
                    <!-- User Icon -->
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <input type="text" class="input-field" placeholder="Username or Email">
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <!-- Lock Icon -->
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    <input type="password" class="input-field" placeholder="Password">
                    <!-- Toggle Password Icon -->
                    <svg class="toggle-password" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                </div>
            </div>

            <div class="actions">
                <label class="remember-me">
                    <input type="checkbox">
                    <div class="toggle-switch"></div>
                    <span class="remember-text">Remember me</span>
                </label>
                <a href="forgot_password.html" class="forgot-password">Forgot Password?</a>
            </div>

            <button type="button" class="btn btn-primary">Sign In</button>

            <div class="divider">
                <span>Or continue with</span>
            </div>

            <button type="button" class="btn btn-social">
                <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
                    <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
                    <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                    <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
                </svg>
                Google
            </button>
        </form>

        <div class="footer">
            Don't have an account? <a href="register.html">Create new account</a>
        </div>
    </div>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
    </button>

    <script>
        // Theme Toggle Logic
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
