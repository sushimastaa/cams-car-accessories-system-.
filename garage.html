<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Garage - Car Accessories Management System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Override global body styles for scrolling layout */
        body {
            display: block;
            height: auto;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: var(--card-bg);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }
        .logo { font-weight: 600; font-size: 1.2rem; color: var(--text-main); }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        .nav-links a:hover { color: var(--text-main); }
        
        /* Avatar Icon */
        .avatar-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            color: white;
            font-weight: 600;
            text-decoration: none;
        }
        .avatar-icon:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            transform: scale(1.1);
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header { margin-bottom: 30px; }
        .page-header h1 { margin: 0; font-size: 2rem; color: var(--text-main); }
        .page-header p { color: var(--text-muted); margin-top: 8px; }

        .garage-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
        }

        .card h2 { margin-top: 0; color: var(--text-main); font-size: 1.25rem; margin-bottom: 20px; }

        /* Form Styles */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        .input-field-garage {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            font-family: inherit;
        }
        .input-field-garage:focus { border-color: var(--accent-color); }

        /* Vehicle List */
        .vehicle-list { display: flex; flex-direction: column; gap: 16px; }
        .vehicle-card {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .vehicle-info h3 { margin: 0 0 4px; color: var(--text-main); font-size: 1.1rem; }
        .vehicle-info p { margin: 0; color: var(--text-muted); font-size: 0.9rem; }
        .btn-remove { color: #ef4444; background: none; border: none; cursor: pointer; font-size: 0.9rem; }
        .btn-remove:hover { text-decoration: underline; }

        /* Compatibility Section */
        .compatibility-result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
            font-weight: 600;
        }
        .result-compatible { 
            background-color: rgba(34, 197, 94, 0.15); 
            color: #22c55e; 
            border: 2px solid #22c55e;
        }
        .result-incompatible { 
            background-color: rgba(239, 68, 68, 0.15); 
            color: #ef4444; 
            border: 2px solid #ef4444;
        }

        @media (max-width: 768px) {
            .garage-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">CAMS</div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="garage.html" style="color: var(--text-main);">Garage</a>
            <a href="cart.html">Cart</a>
            <a href="settings.html" class="avatar-icon" title="Settings">👤</a>
            <a href="index.html" onclick="handleLogout(); return false;">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>My Garage</h1>
            <p>Add your vehicles to check part compatibility automatically.</p>
        </div>

        <div class="garage-grid">
            <!-- Add Vehicle Form -->
            <div class="card">
                <h2>Add a Vehicle</h2>
                <form id="addVehicleForm" onsubmit="addVehicleToGarage(event)">
                    <div class="form-group">
                        <label class="form-label">Make</label>
                        <input type="text" id="car_make" class="input-field-garage" placeholder="e.g. Toyota" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Model</label>
                        <input type="text" id="car_model" class="input-field-garage" placeholder="e.g. Vios" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Year</label>
                        <input type="number" id="car_year" class="input-field-garage" placeholder="e.g. 2024" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Plate Number (Optional)</label>
                        <input type="text" id="plate_number" class="input-field-garage" placeholder="e.g. ABC 1234">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Save to Garage</button>
                </form>
            </div>

            <!-- Vehicle List -->
            <div class="card">
                <h2>My Vehicles</h2>
                <div id="vehicleList" class="vehicle-list">
                    <!-- Vehicles will be injected here -->
                    <p style="color: var(--text-muted);">Loading vehicles...</p>
                </div>
            </div>
        </div>

        <!-- Compatibility Checker -->
        <div class="card">
            <h2>Check Part Compatibility</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Select a vehicle from your garage and a part to see if it fits.</p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 16px; align-items: end;">
                <div class="form-group" style="margin: 0;">
                    <label class="form-label">Select Vehicle</label>
                    <select id="vehicleSelect" class="input-field-garage" onchange="updateSelectedVehicleDisplay()">
                        <option value="">-- Select Vehicle --</option>
                    </select>
                </div>
                <div class="form-group" style="margin: 0;">
                    <label class="form-label">Select Part</label>
                    <select id="partSelect" class="input-field-garage" required>
                        <option value="">-- Loading Parts --</option>
                    </select>
                </div>
                <button onclick="checkCompatibility()" class="btn btn-primary" style="width: auto; margin: 0;">Check Fitment</button>
            </div>
            
            <p id="selectedVehicleDisplay" style="color: var(--accent-color); margin-top: 8px; font-weight: 600; display: none;"></p>

            <div id="compatibilityResult" class="compatibility-result"></div>
        </div>
    </div>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
    </button>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>

    <script>
        let myVehicles = [];
        let allProducts = [];

        async function fetchGarage() {
            const session = await getSession();
            if (!session) {
                window.location.href = 'index.html';
                return;
            }

            const { data: vehicles, error } = await window.supabase
                .from('garage')
                .select('*')
                .eq('user_id', session.user.id)
                .order('car_year', { ascending: false });

            if (error) {
                console.error("Error fetching garage:", error);
                document.getElementById('vehicleList').innerHTML = '<p style="color: #ef4444;">Error loading vehicles.</p>';
                return;
            }

            myVehicles = vehicles || [];
            renderVehicles();
        }

        async function fetchProductsForDropdown() {
            const { data: products, error } = await window.supabase
                .from('products')
                .select('id, name, compatibility');

            if (error) {
                console.error("Error fetching products:", error);
                return;
            }

            allProducts = products || [];
            const partSelect = document.getElementById('partSelect');
            partSelect.innerHTML = '<option value="">-- Select Part --</option>'; 
            
            allProducts.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = p.name;
                partSelect.appendChild(option);
            });
        }

        function renderVehicles() {
            const list = document.getElementById('vehicleList');
            const select = document.getElementById('vehicleSelect');
            
            list.innerHTML = '';
            select.innerHTML = '<option value="">-- Select Vehicle --</option>';

            if (myVehicles.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted);">No vehicles added yet.</p>';
                return;
            }

            myVehicles.forEach((v, index) => {
                list.innerHTML += `
                    <div class="vehicle-card">
                        <div class="vehicle-info">
                            <h3>${v.car_year} ${v.car_make} ${v.car_model}</h3>
                            <p>${v.plate_number ? 'Plate: ' + v.plate_number : 'Added to Garage'}</p>
                        </div>
                        <button class="btn-remove" onclick="removeVehicle('${v.id}')">Remove</button>
                    </div>
                `;
                select.innerHTML += `<option value="${index}">${v.car_year} ${v.car_make} ${v.car_model}</option>`;
            });
        }

        async function addVehicleToGarage(e) {
            e.preventDefault();
            const session = await getSession();
            if (!session) return;

            const make = document.getElementById('car_make').value;
            const model = document.getElementById('car_model').value;
            const year = parseInt(document.getElementById('car_year').value);
            const plate = document.getElementById('plate_number').value;

            const { data, error } = await window.supabase
                .from('garage')
                .insert([{
                    user_id: session.user.id,
                    car_make: make,
                    car_model: model,
                    car_year: year,
                    plate_number: plate
                }]);

            if (error) {
                alert("Error adding vehicle: " + error.message);
            } else {
                document.getElementById('addVehicleForm').reset();
                fetchGarage(); // Reload the list
            }
        }

        async function removeVehicle(id) {
            const session = await getSession();
            if (!session) return;

            const { error } = await window.supabase
                .from('garage')
                .delete()
                .eq('id', id)
                .eq('user_id', session.user.id);

            if (error) {
                alert("Error removing vehicle: " + error.message);
            } else {
                fetchGarage(); // Reload the list
            }
        }

        function updateSelectedVehicleDisplay() {
            const selectedIndex = document.getElementById('vehicleSelect').value;
            const displayElement = document.getElementById('selectedVehicleDisplay');
            
            if (selectedIndex === "") {
                displayElement.style.display = 'none';
            } else {
                const vehicle = myVehicles[selectedIndex];
                displayElement.textContent = `Selected: ${vehicle.car_year} ${vehicle.car_make} ${vehicle.car_model}`;
                displayElement.style.display = 'block';
            }
        }

        function checkCompatibility() {
            const selectedIndex = document.getElementById('vehicleSelect').value;
            const selectedPartId = document.getElementById('partSelect').value;
            const resultDiv = document.getElementById('compatibilityResult');

            if (selectedIndex === "") {
                alert("Please select a vehicle first.");
                return;
            }
            if (selectedPartId === "") {
                alert("Please select a part first.");
                return;
            }

            const vehicle = myVehicles[selectedIndex];
            const selectedProduct = allProducts.find(p => p.id == selectedPartId);
            const vehicleDisplay = `${vehicle.car_year} ${vehicle.car_make} ${vehicle.car_model}`;
            
            // For now, assume Universal compatibility or matching makes.
            // Ideally, your 'products' table would have a 'compatibility' array or string.
            // Assuming we added a 'compatibility' column to products that says "Universal" or "Toyota".
            const isUniversal = !selectedProduct.compatibility || selectedProduct.compatibility.toLowerCase() === 'universal';
            const isSpecificMatch = selectedProduct.compatibility && selectedProduct.compatibility.toLowerCase() === vehicle.car_make.toLowerCase();
            const isCompatible = isUniversal || isSpecificMatch;

            resultDiv.style.display = 'block';
            if (isCompatible) {
                resultDiv.className = 'compatibility-result result-compatible';
                resultDiv.innerHTML = `✓ Compatible - ${selectedProduct.name} is compatible with your ${vehicleDisplay}`;
            } else {
                resultDiv.className = 'compatibility-result result-incompatible';
                resultDiv.innerHTML = `✗ Incompatible - ${selectedProduct.name} may not fit your ${vehicleDisplay}`;
            }
        }

        // Initialize Data on Load
        document.addEventListener('DOMContentLoaded', () => {
            fetchGarage();
            fetchProductsForDropdown();
        });

        // Theme Toggle Logic
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
