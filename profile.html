<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Car Accessories Management System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Override global body styles for scrolling layout */
        body {
            display: block;
            height: auto;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        /* Navbar (Consistent with home.html) */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: rgba(24, 27, 33, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }
        .logo { font-weight: 600; font-size: 1.2rem; color: var(--text-main); }
        .nav-links { display: flex; gap: 24px; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        .nav-links a:hover { color: var(--text-main); }

        /* Profile Specific Styles */
        .profile-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .profile-header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }
        .profile-header h1 { margin: 0; font-size: 2rem; color: var(--text-main); }
        .profile-header p { color: var(--text-muted); margin-top: 8px; }

        .profile-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .profile-section h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.25rem;
            color: var(--text-main);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .form-group { margin-bottom: 15px; }
        .form-group.full-width { grid-column: span 2; }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Custom input style for profile (no icons) */
        .input-field-profile {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
            font-family: inherit;
        }
        .input-field-profile:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .btn-save { width: auto; padding: 10px 24px; }
        .btn-danger { background-color: #ef4444; color: white; border: none; }
        .btn-danger:hover { background-color: #dc2626; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">CAMS</div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="cart.html">Cart</a>
            <a href="garage.html">Garage</a>
            <a href="profile.html" style="color: var(--text-main);">Profile</a>
            <a href="index.html">Logout</a>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-header">
            <h1>My Profile</h1>
            <p>Manage your account settings and preferences</p>
        </div>

        <form>
            <!-- Personal Information -->
            <div class="profile-section">
                <h2>Personal Information</h2>
                <div class="form-grid">
                    <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="input-field-profile" value="Admin User"></div>
                    <div class="form-group"><label class="form-label">Email Address</label><input type="email" class="input-field-profile" value="admin@cams.com"></div>
                    <div class="form-group"><label class="form-label">Phone Number</label><input type="tel" class="input-field-profile" value="+1 (555) 123-4567"></div>
                    <div class="form-group full-width"><label class="form-label">Full Address</label><textarea class="input-field-profile" rows="3">123 Automotive Lane, Garage City, GC 45678</textarea></div>
                </div>
                <div style="text-align: right; margin-top: 20px;"><button type="button" class="btn btn-primary btn-save">Save Changes</button></div>
            </div>

            <!-- Security -->
            <div class="profile-section">
                <h2>Security</h2>
                <div class="form-grid">
                    <div class="form-group full-width"><label class="form-label">Current Password</label><input type="password" class="input-field-profile"></div>
                    <div class="form-group"><label class="form-label">New Password</label><input type="password" class="input-field-profile"></div>
                    <div class="form-group"><label class="form-label">Confirm New Password</label><input type="password" class="input-field-profile"></div>
                </div>
                <div style="text-align: right; margin-top: 20px;"><button type="button" class="btn btn-primary btn-save">Update Password</button></div>
            </div>

            <!-- Sign Out Option -->
            <div class="profile-section" style="border-color: rgba(239, 68, 68, 0.3);">
                <h2 style="color: #ef4444;">Account Actions</h2>
                <p style="color: var(--text-muted); margin-bottom: 20px;">Sign out of your account on this device.</p>
                <button type="button" class="btn btn-danger btn-save" onclick="window.location.href='index.html'">Sign Out</button>
            </div>
        </form>
    </div>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
    </button>

    <script>
        // Theme Toggle Logic
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
