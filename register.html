<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Tech Drawing SVG (Abstract Brake Disc/Part) -->
    <svg class="tech-drawing" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
            </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />
        
        <!-- Main Part Outline -->
        <circle cx="200" cy="200" r="150" fill="none" stroke="#ffffff" stroke-width="1" />
        <circle cx="200" cy="200" r="140" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="5,5" />
        <circle cx="200" cy="200" r="60" fill="none" stroke="#ffffff" stroke-width="1" />
        
        <!-- Crosshairs -->
        <line x1="20" y1="200" x2="380" y2="200" stroke="#ffffff" stroke-width="0.5" />
        <line x1="200" y1="20" x2="200" y2="380" stroke="#ffffff" stroke-width="0.5" />
        
        <!-- Detail Elements -->
        <circle cx="200" cy="100" r="10" fill="none" stroke="#ffffff" stroke-width="1" />
        <circle cx="200" cy="300" r="10" fill="none" stroke="#ffffff" stroke-width="1" />
        <circle cx="100" cy="200" r="10" fill="none" stroke="#ffffff" stroke-width="1" />
        <circle cx="300" cy="200" r="10" fill="none" stroke="#ffffff" stroke-width="1" />
        
        <!-- Measurement Lines -->
        <path d="M 360 200 L 370 200 L 370 100 L 360 100" fill="none" stroke="#ffffff" stroke-width="0.5" />
        <text x="375" y="150" fill="#ffffff" font-family="monospace" font-size="10" opacity="0.8">Ø300mm</text>
    </svg>

    <div class="login-card">
        <div class="header">
            <h1>Create Account</h1>
            <p>Join us to manage your car accessories</p>
        </div>

        <form id="registerForm">
            <div class="input-group">
                <div class="input-wrapper">
                    <!-- User Icon -->
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <input type="text" id="username" class="input-field" placeholder="Username" required>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <!-- Email Icon -->
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    <input type="email" id="email" class="input-field" placeholder="Email Address" required>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <!-- Lock Icon -->
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    <input type="password" id="password" class="input-field" placeholder="Password" required>
                    <!-- Toggle Password Icon -->
                    <svg class="toggle-password" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <!-- Lock Icon -->
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm Password" required>
                    <!-- Toggle Password Icon -->
                    <svg class="toggle-password" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Sign Up</button>
        </form>

        <div class="footer">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
    </button>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match.');
                return;
            }

            // Sign up using Supabase
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        username: username
                    }
                }
            });

            if (error) {
                alert('Error creating account: ' + error.message);
                return;
            }

            alert('Account created successfully! Check your email to verify (if enabled), or login now.');
            window.location.href = 'login.html';
        });

        // Toggle Password Visibility
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
            });
        });

        // Theme Toggle Logic
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
